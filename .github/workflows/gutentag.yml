name: Gutentag, World!

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-r@v2

      - name: Run
        run: Rscript gutentag_world.R

      - name: Verify output
        run: bash test.sh
